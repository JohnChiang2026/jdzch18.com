<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>正在跳转 — 外部链接提示</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="card">
    <img class="logo" src="https://class1.hanze.icu/static/image/chms.png" alt="https://class1.hanze.icu/static/image/chms.png">
    <h1>您即将离开昌河中学网站</h1>
    <p id="message">请确认后点击“继续前往”。</p>
    <div class="meta">
      <div><strong>主机：</strong><span id="host">—</span></div>
      <div><strong>完整链接：</strong><span id="href">—</span></div>
      <p>您即将访问的站点需要科学上网，请确定您已正确配置网络环境。</p>
    </div>
    <div class="controls">
      <label><input type="checkbox" id="newtab" checked> 在新标签页打开</label>
      <div class="buttons">
        <button type="button" id="cancel">取消</button>
        <button type="button" id="continue">继续前往</button>
      </div>
    </div>
    <p class="note">该网页快照由互联网档案馆(archive.org)提供<br>本站及其附属站点由 星野暝Mei. 维护</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
